#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.local

# Custom admin user instead of the stock 'ubuntu' one
users:
  - name: ${username}
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

# Key-based access only
ssh_pwauth: false
disable_root: true

timezone: Europe/Rome

# Refresh the package index and install extras on first boot
package_update: true
packages:
  - qemu-guest-agent
  - htop
  - net-tools

runcmd:
  - systemctl enable --now qemu-guest-agent

growpart:
  mode: auto
  devices: ["/"]
